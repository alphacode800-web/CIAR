<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f0d"/>
      <stop offset="100%" stop-color="#0a1a14"/>
    </linearGradient>
    <linearGradient id="green1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="green2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <linearGradient id="green3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="50"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Ambient glow -->
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="750" cy="250" rx="300" ry="200" fill="url(#glow2)" filter="url(#blur1)"/>
  
  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#34d399">
    <line x1="300" y1="0" x2="300" y2="630" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="630" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="630" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke-width="1"/>
  </g>
  
  <!-- Data visualization bars -->
  <g transform="translate(200, 150)" opacity="0.85">
    <rect x="0" y="260" width="45" height="60" rx="6" fill="url(#green3)" opacity="0.5"/>
    <rect x="60" y="200" width="45" height="120" rx="6" fill="url(#green1)" opacity="0.6"/>
    <rect x="120" y="150" width="45" height="170" rx="6" fill="url(#green2)" opacity="0.7"/>
    <rect x="180" y="100" width="45" height="220" rx="6" fill="url(#green1)" opacity="0.8"/>
    <rect x="240" y="60" width="45" height="260" rx="6" fill="url(#green2)" opacity="0.9"/>
    <rect x="300" y="80" width="45" height="240" rx="6" fill="url(#green1)" opacity="0.85"/>
    <rect x="360" y="130" width="45" height="190" rx="6" fill="url(#green3)" opacity="0.7"/>
    <rect x="420" y="50" width="45" height="270" rx="6" fill="url(#green2)" opacity="0.95"/>
    <rect x="480" y="90" width="45" height="230" rx="6" fill="url(#green1)" opacity="0.8"/>
    <rect x="540" y="170" width="45" height="150" rx="6" fill="url(#green3)" opacity="0.6"/>
    <rect x="600" y="120" width="45" height="200" rx="6" fill="url(#green2)" opacity="0.75"/>
    <rect x="660" y="180" width="45" height="140" rx="6" fill="url(#green1)" opacity="0.55"/>
    <rect x="720" y="230" width="45" height="90" rx="6" fill="url(#green3)" opacity="0.4"/>
  </g>
  
  <!-- Pulse line overlay -->
  <g transform="translate(200, 440)" opacity="0.7">
    <polyline points="0,0 60,-20 120,-50 180,-80 240,-130 300,-110 360,-70 420,-140 480,-100 540,-40 600,-80 660,-30 720,10"
      fill="none" stroke="url(#green2)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Glow on pulse -->
    <polyline points="0,0 60,-20 120,-50 180,-80 240,-130 300,-110 360,-70 420,-140 480,-100 540,-40 600,-80 660,-30 720,10"
      fill="none" stroke="#34d399" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#blur2)" opacity="0.4"/>
  </g>
  
  <!-- Floating data points -->
  <g opacity="0.5">
    <circle cx="300" cy="180" r="4" fill="#34d399"/>
    <circle cx="420" cy="460" r="5" fill="#6ee7b7"/>
    <circle cx="550" cy="160" r="3" fill="#10b981"/>
    <circle cx="780" cy="200" r="4" fill="#34d399"/>
    <circle cx="900" cy="420" r="3.5" fill="#6ee7b7"/>
    <circle cx="160" cy="350" r="3" fill="#10b981"/>
    <circle cx="1020" cy="280" r="4" fill="#34d399"/>
    <circle cx="680" cy="480" r="3" fill="#6ee7b7"/>
  </g>
  
  <!-- Pulse rings -->
  <g transform="translate(420, 300)" opacity="0.12">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#34d399" stroke-width="1"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="#34d399" stroke-width="0.5"/>
  </g>
  
  <!-- Mini chart card -->
  <g transform="translate(850, 120)" opacity="0.6">
    <rect width="220" height="140" rx="12" fill="#0a1a14" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="16" y="16" width="60" height="6" rx="3" fill="#10b981" opacity="0.4"/>
    <rect x="16" y="36" width="100" height="6" rx="3" fill="#34d399" opacity="0.2"/>
    <polyline points="16,110 50,90 85,100 120,70 155,80 190,55" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
    <text x="190" y="20" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#6ee7b7" opacity="0.5">LIVE</text>
    <circle cx="204" cy="16" r="3" fill="#34d399" opacity="0.8"/>
  </g>
  
  <!-- Brand text -->
  <g transform="translate(600, 560)">
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#34d399" letter-spacing="6" opacity="0.7">DATAPULSE</text>
  </g>
  
  <!-- Top left accent -->
  <g transform="translate(60, 50)">
    <rect width="4" height="32" rx="2" fill="#10b981" opacity="0.6"/>
    <rect x="10" width="4" height="20" rx="2" fill="#34d399" opacity="0.4"/>
  </g>
  
  <!-- Version tag -->
  <g transform="translate(1050, 575)">
    <rect x="0" y="-14" width="90" height="22" rx="11" fill="#10b981" opacity="0.15"/>
    <text x="45" y="2" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#34d399" opacity="0.6">v2.1.4</text>
  </g>
</svg>