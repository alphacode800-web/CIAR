<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1525"/>
    </linearGradient>
    <linearGradient id="cloud1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="cloud2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="cloud3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <filter id="blur2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <clipPath id="roundClip">
      <rect x="0" y="0" width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Ambient glow -->
  <ellipse cx="400" cy="300" rx="500" ry="350" fill="url(#glow1)" filter="url(#blur2)"/>
  <ellipse cx="850" cy="250" rx="400" ry="300" fill="url(#glow2)" filter="url(#blur2)"/>
  
  <!-- Grid dots (subtle) -->
  <g opacity="0.08">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#67e8f9"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>
  
  <!-- Large cloud shape - back -->
  <g filter="url(#blur1)" opacity="0.4">
    <ellipse cx="600" cy="320" rx="280" ry="120" fill="url(#cloud2)"/>
    <circle cx="480" cy="280" r="100" fill="url(#cloud2)"/>
    <circle cx="620" cy="260" r="120" fill="url(#cloud2)"/>
    <circle cx="740" cy="300" r="90" fill="url(#cloud2)"/>
  </g>
  
  <!-- Main cloud composition -->
  <g transform="translate(600, 300)">
    <!-- Cloud base -->
    <ellipse cx="-30" cy="40" rx="180" ry="70" fill="url(#cloud1)" opacity="0.85"/>
    <circle cx="-100" cy="0" r="85" fill="url(#cloud1)" opacity="0.9"/>
    <circle cx="30" cy="-30" r="100" fill="url(#cloud3)" opacity="0.85"/>
    <circle cx="130" cy="10" r="70" fill="url(#cloud1)" opacity="0.8"/>
    
    <!-- Sync arrows -->
    <g transform="translate(0, 10)" opacity="0.95">
      <!-- Circular sync icon -->
      <path d="M -35,-20 A 40,40 0 0,1 35,-20" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <polygon points="35,-20 27,-28 33,-12" fill="#fff"/>
      <path d="M 35,20 A 40,40 0 0,1 -35,20" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <polygon points="-35,20 -27,28 -33,12" fill="#fff"/>
    </g>
  </g>
  
  <!-- Floating cloud elements -->
  <g opacity="0.5">
    <ellipse cx="150" cy="480" rx="80" ry="35" fill="url(#cloud1)"/>
    <circle cx="100" cy="460" r="35" fill="url(#cloud1)"/>
    <circle cx="180" cy="465" r="30" fill="url(#cloud1)"/>
  </g>
  <g opacity="0.3">
    <ellipse cx="1050" cy="150" rx="90" ry="40" fill="url(#cloud3)"/>
    <circle cx="1000" cy="125" r="40" fill="url(#cloud3)"/>
    <circle cx="1090" cy="135" r="35" fill="url(#cloud3)"/>
  </g>
  
  <!-- Connection lines (sync concept) -->
  <g opacity="0.15" stroke="#67e8f9" stroke-width="1">
    <line x1="200" y1="470" x2="420" y2="350"/>
    <line x1="960" y1="160" x2="750" y2="280"/>
    <line x1="300" y1="300" x2="420" y2="300"/>
    <line x1="780" y1="310" x2="960" y2="160"/>
  </g>
  
  <!-- Floating particles -->
  <g opacity="0.6">
    <circle cx="250" cy="200" r="3" fill="#38bdf8"/>
    <circle cx="350" cy="450" r="2" fill="#06b6d4"/>
    <circle cx="850" cy="400" r="2.5" fill="#0ea5e9"/>
    <circle cx="950" cy="300" r="2" fill="#38bdf8"/>
    <circle cx="180" cy="350" r="1.5" fill="#67e8f9"/>
    <circle cx="1020" cy="420" r="2" fill="#06b6d4"/>
    <circle cx="700" cy="500" r="1.5" fill="#38bdf8"/>
    <circle cx="450" cy="150" r="2" fill="#67e8f9"/>
  </g>
  
  <!-- Brand text -->
  <g transform="translate(600, 560)">
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#67e8f9" letter-spacing="6" opacity="0.7">CLOUDSYNC</text>
  </g>
  
  <!-- Top left accent -->
  <g transform="translate(60, 50)">
    <rect width="4" height="32" rx="2" fill="#0ea5e9" opacity="0.6"/>
    <rect x="10" width="4" height="20" rx="2" fill="#06b6d4" opacity="0.4"/>
  </g>
  
  <!-- Bottom right version tag -->
  <g transform="translate(1050, 575)">
    <rect x="0" y="-14" width="90" height="22" rx="11" fill="#0ea5e9" opacity="0.15"/>
    <text x="45" y="2" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="#38bdf8" opacity="0.6">v3.2.0</text>
  </g>
</svg>