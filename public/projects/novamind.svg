<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="50%" stop-color="#0a0a20"/>
      <stop offset="100%" stop-color="#070515"/>
    </linearGradient>
    <radialGradient id="nebula1" cx="35%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.2"/>
      <stop offset="40%" stop-color="#4f46e5" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="70%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#0d9488" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="55%" cy="25%" r="30%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlowTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Nebula effects -->
  <ellipse cx="420" cy="250" rx="400" ry="280" fill="url(#nebula1)" filter="url(#blur1)"/>
  <ellipse cx="840" cy="380" rx="350" ry="240" fill="url(#nebula2)" filter="url(#blur1)"/>
  <ellipse cx="660" cy="160" rx="280" ry="180" fill="url(#nebula3)" filter="url(#blur1)"/>
  
  <!-- Stars - small -->
  <g fill="#fff">
    <circle cx="120" cy="80" r="1" opacity="0.6"/>
    <circle cx="250" cy="45" r="0.8" opacity="0.4"/>
    <circle cx="380" cy="120" r="1.2" opacity="0.5"/>
    <circle cx="520" cy="30" r="0.7" opacity="0.3"/>
    <circle cx="680" cy="75" r="1" opacity="0.5"/>
    <circle cx="790" cy="40" r="0.9" opacity="0.4"/>
    <circle cx="920" cy="90" r="1.1" opacity="0.6"/>
    <circle cx="1050" cy="55" r="0.8" opacity="0.3"/>
    <circle cx="1140" cy="120" r="1" opacity="0.5"/>
    <circle cx="80" cy="200" r="0.7" opacity="0.3"/>
    <circle cx="1100" cy="250" r="0.9" opacity="0.4"/>
    <circle cx="60" cy="400" r="1" opacity="0.5"/>
    <circle cx="1150" cy="400" r="0.8" opacity="0.4"/>
    <circle cx="100" cy="550" r="0.9" opacity="0.3"/>
    <circle cx="1100" cy="520" r="1.1" opacity="0.5"/>
    <circle cx="300" cy="580" r="0.7" opacity="0.3"/>
    <circle cx="500" cy="560" r="0.8" opacity="0.4"/>
    <circle cx="700" cy="590" r="1" opacity="0.5"/>
    <circle cx="900" cy="570" r="0.9" opacity="0.4"/>
    <circle cx="450" cy="490" r="0.6" opacity="0.3"/>
    <circle cx="750" cy="480" r="0.7" opacity="0.3"/>
    <circle cx="200" cy="350" r="0.8" opacity="0.35"/>
    <circle cx="1000" cy="300" r="0.7" opacity="0.3"/>
    <circle cx="550" cy="420" r="0.6" opacity="0.25"/>
    <circle cx="350" cy="300" r="0.9" opacity="0.4"/>
  </g>
  
  <!-- Stars - bright with glow -->
  <g>
    <circle cx="200" cy="130" r="2" fill="#c4b5fd" opacity="0.7" filter="url(#starGlow)"/>
    <circle cx="1000" cy="170" r="2.5" fill="#99f6e4" opacity="0.6" filter="url(#starGlow)"/>
    <circle cx="150" cy="480" r="2" fill="#c4b5fd" opacity="0.5" filter="url(#starGlow)"/>
    <circle cx="1060" cy="460" r="1.8" fill="#99f6e4" opacity="0.6" filter="url(#starGlow)"/>
    <circle cx="600" cy="80" r="2.2" fill="#e9d5ff" opacity="0.5" filter="url(#starGlow)"/>
  </g>
  
  <!-- Neural network connections -->
  <g stroke-width="1" opacity="0.2">
    <!-- Purple connections -->
    <line x1="350" y1="200" x2="500" y2="280" stroke="#a78bfa"/>
    <line x1="500" y1="280" x2="650" y2="220" stroke="#a78bfa"/>
    <line x1="650" y1="220" x2="800" y2="300" stroke="#818cf8"/>
    <line x1="800" y1="300" x2="900" y2="250" stroke="#a78bfa"/>
    <line x1="500" y1="280" x2="600" y2="370" stroke="#c084fc"/>
    <line x1="600" y1="370" x2="750" y2="350" stroke="#a78bfa"/>
    <line x1="750" y1="350" x2="800" y2="300" stroke="#818cf8"/>
    <line x1="350" y1="200" x2="300" y2="330" stroke="#c084fc"/>
    <line x1="300" y1="330" x2="500" y2="280" stroke="#a78bfa"/>
    <line x1="600" y1="370" x2="550" y2="440" stroke="#a78bfa"/>
    <line x1="750" y1="350" x2="850" y2="420" stroke="#c084fc"/>
    
    <!-- Teal connections -->
    <line x1="400" y1="350" x2="500" y2="280" stroke="#2dd4bf"/>
    <line x1="400" y1="350" x2="300" y2="330" stroke="#14b8a6"/>
    <line x1="850" y1="420" x2="950" y2="370" stroke="#2dd4bf"/>
    <line x1="950" y1="370" x2="900" y2="250" stroke="#14b8a6"/>
    <line x1="650" y1="220" x2="700" y2="150" stroke="#2dd4bf"/>
    <line x1="550" y1="440" x2="450" y2="480" stroke="#14b8a6"/>
  </g>
  
  <!-- Glowing connection lines -->
  <g stroke-width="2" opacity="0.08" filter="url(#blur2)">
    <line x1="350" y1="200" x2="500" y2="280" stroke="#a78bfa"/>
    <line x1="500" y1="280" x2="650" y2="220" stroke="#a78bfa"/>
    <line x1="650" y1="220" x2="800" y2="300" stroke="#818cf8"/>
    <line x1="500" y1="280" x2="600" y2="370" stroke="#c084fc"/>
    <line x1="600" y1="370" x2="750" y2="350" stroke="#a78bfa"/>
  </g>
  
  <!-- Neural network nodes - purple -->
  <g>
    <circle cx="350" cy="200" r="8" fill="url(#nodeGlow)" opacity="0.9"/>
    <circle cx="350" cy="200" r="4" fill="#a78bfa"/>
    
    <circle cx="500" cy="280" r="10" fill="url(#nodeGlow)" opacity="0.9"/>
    <circle cx="500" cy="280" r="5" fill="#c084fc"/>
    
    <circle cx="650" cy="220" r="8" fill="url(#nodeGlow)" opacity="0.8"/>
    <circle cx="650" cy="220" r="4" fill="#a78bfa"/>
    
    <circle cx="800" cy="300" r="9" fill="url(#nodeGlow)" opacity="0.85"/>
    <circle cx="800" cy="300" r="4.5" fill="#818cf8"/>
    
    <circle cx="900" cy="250" r="7" fill="url(#nodeGlow)" opacity="0.7"/>
    <circle cx="900" cy="250" r="3.5" fill="#a78bfa"/>
    
    <circle cx="600" cy="370" r="9" fill="url(#nodeGlow)" opacity="0.85"/>
    <circle cx="600" cy="370" r="4.5" fill="#c084fc"/>
    
    <circle cx="750" cy="350" r="7" fill="url(#nodeGlow)" opacity="0.75"/>
    <circle cx="750" cy="350" r="3.5" fill="#a78bfa"/>
    
    <circle cx="300" cy="330" r="7" fill="url(#nodeGlow)" opacity="0.7"/>
    <circle cx="300" cy="330" r="3.5" fill="#a78bfa"/>
    
    <circle cx="550" cy="440" r="6" fill="url(#nodeGlow)" opacity="0.65"/>
    <circle cx="550" cy="440" r="3" fill="#c084fc"/>
    
    <circle cx="850" cy="420" r="7" fill="url(#nodeGlow)" opacity="0.7"/>
    <circle cx="850" cy="420" r="3.5" fill="#a78bfa"/>
  </g>
  
  <!-- Neural network nodes - teal -->
  <g>
    <circle cx="400" cy="350" r="7" fill="url(#nodeGlowTeal)" opacity="0.8"/>
    <circle cx="400" cy="350" r="3.5" fill="#2dd4bf"/>
    
    <circle cx="950" cy="370" r="8" fill="url(#nodeGlowTeal)" opacity="0.85"/>
    <circle cx="950" cy="370" r="4" fill="#2dd4bf"/>
    
    <circle cx="700" cy="150" r="7" fill="url(#nodeGlowTeal)" opacity="0.75"/>
    <circle cx="700" cy="150" r="3.5" fill="#14b8a6"/>
    
    <circle cx="450" cy="480" r="6" fill="url(#nodeGlowTeal)" opacity="0.65"/>
    <circle cx="450" cy="480" r="3" fill="#14b8a6"/>
  </g>
  
  <!-- Floating tiny particles -->
  <g opacity="0.4">
    <circle cx="180" cy="250" r="1.5" fill="#a78bfa"/>
    <circle cx="1020" cy="200" r="1.5" fill="#2dd4bf"/>
    <circle cx="250" cy="420" r="1" fill="#c084fc"/>
    <circle cx="980" cy="450" r="1" fill="#14b8a6"/>
    <circle cx="580" cy="180" r="1.5" fill="#a78bfa"/>
    <circle cx="720" cy="450" r="1" fill="#2dd4bf"/>
    <circle cx="420" cy="140" r="1" fill="#c084fc"/>
    <circle cx="880" cy="160" r="1.5" fill="#14b8a6"/>
  </g>
  
  <!-- Brand text -->
  <g transform="translate(600, 560)">
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#a78bfa" letter-spacing="6" opacity="0.7">NOVAMIND</text>
  </g>
  
  <!-- Top left accent -->
  <g transform="translate(60, 50)">
    <rect width="4" height="32" rx="2" fill="#7c3aed" opacity="0.6"/>
    <rect x="10" width="4" height="20" rx="2" fill="#14b8a6" opacity="0.4"/>
  </g>
  
  <!-- Version tag -->
  <g transform="translate(1050, 575)">
    <rect x="0" y="-14" width="90" height="22" rx="11" fill="#7c3aed" opacity="0.15"/>
    <text x="45" y="2" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#a78bfa" opacity="0.6">v1.0.0</text>
  </g>
</svg>