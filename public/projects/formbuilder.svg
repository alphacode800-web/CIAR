<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#141418"/>
    </linearGradient>
    <linearGradient id="slate1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="slate2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#64748b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#64748b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="35%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="50"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Ambient glow -->
  <ellipse cx="600" cy="300" rx="500" ry="300" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="400" cy="280" rx="300" ry="200" fill="url(#glow2)" filter="url(#blur1)"/>
  
  <!-- Subtle dot grid -->
  <g opacity="0.04">
    <pattern id="formDots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.8" fill="#94a3b8"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#formDots)"/>
  </g>
  
  <!-- Form builder card - main -->
  <g transform="translate(280, 60)">
    <!-- Card body -->
    <rect width="640" height="500" rx="16" fill="#111114" stroke="#475569" stroke-width="0.5" stroke-opacity="0.2"/>
    
    <!-- Card header -->
    <rect width="640" height="56" rx="16" fill="#16161a"/>
    <rect y="16" width="640" height="40" fill="#16161a"/>
    <line x1="0" y1="56" x2="640" y2="56" stroke="#475569" stroke-width="0.5" stroke-opacity="0.15"/>
    
    <!-- Header elements -->
    <circle cx="24" cy="28" r="8" fill="#6366f1" opacity="0.2"/>
    <rect x="14" y="23" width="20" height="10" rx="2" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
    <line x1="16" y1="28" x2="32" y2="28" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <text x="48" y="33" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#94a3b8" opacity="0.6">Form Builder</text>
    
    <!-- Preview / Save buttons -->
    <rect x="480" y="16" width="60" height="24" rx="6" fill="none" stroke="#475569" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="510" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" opacity="0.5">Preview</text>
    <rect x="550" y="16" width="60" height="24" rx="6" fill="url(#accent1)" opacity="0.8"/>
    <text x="580" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#fff" opacity="0.8">Publish</text>
    
    <!-- Form content area -->
    <!-- Section 1: Name field -->
    <g transform="translate(24, 76)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#94a3b8" opacity="0.6">Contact Information</text>
      <line x1="0" y1="12" x2="180" y2="12" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
      
      <!-- First name -->
      <text x="0" y="40" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" opacity="0.5">First Name</text>
      <text x="0" y="40" font-family="system-ui, sans-serif" font-size="10" fill="#ef4444" opacity="0.4">*</text>
      <rect y="48" width="280" height="36" rx="8" fill="#0a0a0c" stroke="#475569" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="12" y="70" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" opacity="0.3">John</text>
      
      <!-- Last name -->
      <text x="304" y="40" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" opacity="0.5">Last Name</text>
      <rect y="48" x="304" width="280" height="36" rx="8" fill="#0a0a0c" stroke="#6366f1" stroke-width="0.8" stroke-opacity="0.5"/>
      <text x="316" y="70" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" opacity="0.4">Doe</text>
      <!-- Cursor indicator -->
      <rect x="348" y="56" width="1.5" height="16" rx="0.75" fill="#6366f1" opacity="0.6"/>
    </g>
    
    <!-- Section 2: Email field -->
    <g transform="translate(24, 180)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" opacity="0.5">Email Address</text>
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="10" fill="#ef4444" opacity="0.4">*</text>
      <rect y="8" width="560" height="36" rx="8" fill="#0a0a0c" stroke="#475569" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="12" y="30" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" opacity="0.3">john@example.com</text>
    </g>
    
    <!-- Section 3: Dropdown -->
    <g transform="translate(24, 244)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" opacity="0.5">Department</text>
      <rect y="8" width="560" height="36" rx="8" fill="#0a0a0c" stroke="#475569" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="12" y="30" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" opacity="0.4">Engineering</text>
      <!-- Dropdown chevron -->
      <path d="M 540,22 L 546,28 L 552,22" fill="none" stroke="#64748b" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
    </g>
    
    <!-- Section 4: Radio buttons -->
    <g transform="translate(24, 308)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" opacity="0.5">Priority</text>
      <!-- Radio 1 - selected -->
      <circle cx="10" cy="24" r="8" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
      <circle cx="10" cy="24" r="4" fill="#6366f1" opacity="0.7"/>
      <text x="24" y="28" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" opacity="0.5">High</text>
      <!-- Radio 2 -->
      <circle cx="90" cy="24" r="8" fill="none" stroke="#475569" stroke-width="1" opacity="0.3"/>
      <text x="104" y="28" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" opacity="0.3">Medium</text>
      <!-- Radio 3 -->
      <circle cx="190" cy="24" r="8" fill="none" stroke="#475569" stroke-width="1" opacity="0.3"/>
      <text x="204" y="28" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" opacity="0.3">Low</text>
    </g>
    
    <!-- Section 5: Checkbox -->
    <g transform="translate(24, 368)">
      <!-- Checkbox 1 - checked -->
      <rect x="0" y="0" width="16" height="16" rx="4" fill="#6366f1" opacity="0.6"/>
      <polyline points="3,8 6,11 13,4" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
      <text x="24" y="12" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" opacity="0.4">Send confirmation email</text>
      
      <!-- Checkbox 2 -->
      <rect x="0" y="28" width="16" height="16" rx="4" fill="none" stroke="#475569" stroke-width="1" opacity="0.3"/>
      <text x="24" y="40" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" opacity="0.3">Subscribe to newsletter</text>
    </g>
    
    <!-- Section 6: Textarea -->
    <g transform="translate(24, 450)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" opacity="0.5">Additional Notes</text>
      <rect y="8" width="560" height="36" rx="8" fill="#0a0a0c" stroke="#475569" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="12" y="30" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" opacity="0.2">Type your message here...</text>
    </g>
    
    <!-- Right sidebar element indicators -->
    <g transform="translate(596, 76)" opacity="0.3">
      <!-- Drag handle dots -->
      <circle cx="4" cy="0" r="1.5" fill="#475569"/>
      <circle cx="12" cy="0" r="1.5" fill="#475569"/>
      <circle cx="4" cy="8" r="1.5" fill="#475569"/>
      <circle cx="12" cy="8" r="1.5" fill="#475569"/>
    </g>
    <g transform="translate(596, 180)" opacity="0.3">
      <circle cx="4" cy="0" r="1.5" fill="#475569"/>
      <circle cx="12" cy="0" r="1.5" fill="#475569"/>
      <circle cx="4" cy="8" r="1.5" fill="#475569"/>
      <circle cx="12" cy="8" r="1.5" fill="#475569"/>
    </g>
    <g transform="translate(596, 244)" opacity="0.3">
      <circle cx="4" cy="0" r="1.5" fill="#475569"/>
      <circle cx="12" cy="0" r="1.5" fill="#475569"/>
      <circle cx="4" cy="8" r="1.5" fill="#475569"/>
      <circle cx="12" cy="8" r="1.5" fill="#475569"/>
    </g>
    <g transform="translate(596, 308)" opacity="0.3">
      <circle cx="4" cy="0" r="1.5" fill="#475569"/>
      <circle cx="12" cy="0" r="1.5" fill="#475569"/>
      <circle cx="4" cy="8" r="1.5" fill="#475569"/>
      <circle cx="12" cy="8" r="1.5" fill="#475569"/>
    </g>
    <g transform="translate(596, 368)" opacity="0.3">
      <circle cx="4" cy="0" r="1.5" fill="#475569"/>
      <circle cx="12" cy="0" r="1.5" fill="#475569"/>
      <circle cx="4" cy="8" r="1.5" fill="#475569"/>
      <circle cx="12" cy="8" r="1.5" fill="#475569"/>
    </g>
    <g transform="translate(596, 450)" opacity="0.3">
      <circle cx="4" cy="0" r="1.5" fill="#475569"/>
      <circle cx="12" cy="0" r="1.5" fill="#475569"/>
      <circle cx="4" cy="8" r="1.5" fill="#475569"/>
      <circle cx="12" cy="8" r="1.5" fill="#475569"/>
    </g>
  </g>
  
  <!-- Floating form element shapes -->
  <g opacity="0.15">
    <!-- Left side decorative elements -->
    <rect x="100" y="150" width="120" height="20" rx="6" fill="none" stroke="#64748b" stroke-width="0.8"/>
    <rect x="100" y="200" width="80" height="16" rx="5" fill="none" stroke="#64748b" stroke-width="0.6"/>
    <circle cx="115" cy="270" r="8" fill="none" stroke="#6366f1" stroke-width="0.8"/>
    <rect x="100" y="300" width="120" height="40" rx="8" fill="none" stroke="#64748b" stroke-width="0.6"/>
    
    <!-- Right side decorative elements -->
    <rect x="980" y="130" width="100" height="20" rx="6" fill="none" stroke="#64748b" stroke-width="0.8"/>
    <rect x="980" y="170" width="60" height="16" rx="5" fill="none" stroke="#6366f1" stroke-width="0.8"/>
    <rect x="980" y="220" width="100" height="40" rx="8" fill="none" stroke="#64748b" stroke-width="0.6"/>
    <circle cx="995" cy="300" r="8" fill="none" stroke="#6366f1" stroke-width="0.8"/>
    <rect x="1015" y="300" width="40" height="16" rx="4" fill="none" stroke="#64748b" stroke-width="0.6"/>
  </g>
  
  <!-- Floating particles -->
  <g opacity="0.3">
    <circle cx="150" cy="420" r="2" fill="#64748b"/>
    <circle cx="1050" cy="400" r="2" fill="#6366f1"/>
    <circle cx="200" cy="500" r="1.5" fill="#94a3b8"/>
    <circle cx="1000" cy="500" r="1.5" fill="#6366f1"/>
    <circle cx="120" cy="300" r="2" fill="#475569"/>
    <circle cx="1080" cy="280" r="2" fill="#818cf8"/>
    <circle cx="180" cy="100" r="1.5" fill="#64748b"/>
    <circle cx="1020" cy="550" r="1.5" fill="#6366f1"/>
  </g>
  
  <!-- Brand text -->
  <g transform="translate(600, 590)">
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#94a3b8" letter-spacing="6" opacity="0.7">FORMBUILDER</text>
  </g>
  
  <!-- Top left accent -->
  <g transform="translate(60, 50)">
    <rect width="4" height="32" rx="2" fill="#64748b" opacity="0.6"/>
    <rect x="10" width="4" height="20" rx="2" fill="#6366f1" opacity="0.4"/>
  </g>
  
  <!-- Version tag -->
  <g transform="translate(1050, 575)">
    <rect x="0" y="-14" width="90" height="22" rx="11" fill="#6366f1" opacity="0.15"/>
    <text x="45" y="2" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#818cf8" opacity="0.6">v2.0.0</text>
  </g>
</svg>