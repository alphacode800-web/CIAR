<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="purple1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="purple2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="purple3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="pink1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="50"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="30"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Ambient glow -->
  <ellipse cx="400" cy="350" rx="450" ry="300" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="800" cy="250" rx="350" ry="250" fill="url(#glow2)" filter="url(#blur1)"/>
  
  <!-- Wave shapes -->
  <!-- Back wave -->
  <path d="M -100,420 C 100,350 250,480 450,380 C 650,280 750,420 950,360 C 1100,320 1200,400 1400,350 L 1400,630 L -100,630 Z"
    fill="url(#purple1)" opacity="0.15"/>
  
  <!-- Mid wave -->
  <path d="M -100,460 C 150,400 300,500 500,420 C 700,340 800,460 1000,400 C 1150,360 1250,430 1400,380 L 1400,630 L -100,630 Z"
    fill="url(#purple2)" opacity="0.2"/>
  
  <!-- Front wave -->
  <path d="M -100,500 C 100,460 280,530 480,470 C 680,410 830,500 1030,450 C 1180,410 1280,470 1400,430 L 1400,630 L -100,630 Z"
    fill="url(#purple3)" opacity="0.25"/>
  
  <!-- Animated-looking wave lines -->
  <g opacity="0.5" fill="none" stroke-width="2.5" stroke-linecap="round">
    <path d="M 50,280 C 200,230 350,320 500,260 C 650,200 800,290 950,240 C 1100,190 1150,260 1200,240"
      stroke="url(#purple1)"/>
    <path d="M 50,310 C 200,270 350,340 500,290 C 650,240 800,310 950,270 C 1100,230 1150,280 1200,260"
      stroke="url(#purple2)" opacity="0.6"/>
    <path d="M 50,340 C 200,310 350,360 500,320 C 650,280 800,330 950,300 C 1100,270 1150,310 1200,290"
      stroke="url(#purple1)" opacity="0.4"/>
  </g>
  
  <!-- Glow on waves -->
  <path d="M 50,280 C 200,230 350,320 500,260 C 650,200 800,290 950,240 C 1100,190 1150,260 1200,240"
    fill="none" stroke="#a855f7" stroke-width="10" filter="url(#blur2)" opacity="0.3"/>
  
  <!-- Geometric accents -->
  <g opacity="0.4">
    <rect x="140" y="140" width="60" height="60" rx="12" fill="none" stroke="url(#purple1)" stroke-width="1.5" transform="rotate(15, 170, 170)"/>
    <rect x="1000" y="100" width="50" height="50" rx="10" fill="url(#purple2)" opacity="0.3" transform="rotate(-10, 1025, 125)"/>
    <circle cx="1050" cy="180" r="20" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Play button (streaming concept) -->
  <g transform="translate(600, 280)" opacity="0.8">
    <circle cx="0" cy="0" r="55" fill="none" stroke="url(#purple1)" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="75" fill="none" stroke="url(#purple2)" stroke-width="1" opacity="0.3"/>
    <polygon points="-15,-22 -15,22 25,0" fill="url(#purple2)"/>
    <!-- Glow behind play -->
    <circle cx="0" cy="0" r="40" fill="#a855f7" opacity="0.15" filter="url(#blur2)"/>
  </g>
  
  <!-- Floating particles -->
  <g opacity="0.5">
    <circle cx="200" cy="200" r="3" fill="#a855f7"/>
    <circle cx="350" cy="400" r="2" fill="#ec4899"/>
    <circle cx="900" cy="350" r="2.5" fill="#f472b6"/>
    <circle cx="800" cy="150" r="2" fill="#a855f7"/>
    <circle cx="1100" cy="300" r="3" fill="#ec4899"/>
    <circle cx="150" cy="450" r="2" fill="#f472b6"/>
    <circle cx="1000" cy="450" r="2" fill="#a855f7"/>
  </g>
  
  <!-- Sound wave bars (streaming audio) -->
  <g transform="translate(500, 380)" opacity="0.4">
    <rect x="0" y="-10" width="3" height="20" rx="1.5" fill="#a855f7"/>
    <rect x="8" y="-16" width="3" height="32" rx="1.5" fill="#a855f7"/>
    <rect x="16" y="-8" width="3" height="16" rx="1.5" fill="#c084fc"/>
    <rect x="24" y="-20" width="3" height="40" rx="1.5" fill="#c084fc"/>
    <rect x="32" y="-12" width="3" height="24" rx="1.5" fill="#ec4899"/>
    <rect x="40" y="-18" width="3" height="36" rx="1.5" fill="#ec4899"/>
    <rect x="48" y="-6" width="3" height="12" rx="1.5" fill="#ec4899"/>
    <rect x="56" y="-14" width="3" height="28" rx="1.5" fill="#f472b6"/>
    <rect x="64" y="-10" width="3" height="20" rx="1.5" fill="#f472b6"/>
    <rect x="72" y="-16" width="3" height="32" rx="1.5" fill="#c084fc"/>
    <rect x="80" y="-8" width="3" height="16" rx="1.5" fill="#a855f7"/>
    <rect x="88" y="-12" width="3" height="24" rx="1.5" fill="#a855f7"/>
    <rect x="96" y="-18" width="3" height="36" rx="1.5" fill="#c084fc"/>
    <rect x="104" y="-6" width="3" height="12" rx="1.5" fill="#ec4899"/>
    <rect x="112" y="-14" width="3" height="28" rx="1.5" fill="#ec4899"/>
    <rect x="120" y="-10" width="3" height="20" rx="1.5" fill="#f472b6"/>
    <rect x="128" y="-8" width="3" height="16" rx="1.5" fill="#a855f7"/>
    <rect x="136" y="-16" width="3" height="32" rx="1.5" fill="#c084fc"/>
    <rect x="144" y="-10" width="3" height="20" rx="1.5" fill="#a855f7"/>
    <rect x="152" y="-6" width="3" height="12" rx="1.5" fill="#ec4899"/>
    <rect x="160" y="-14" width="3" height="28" rx="1.5" fill="#f472b6"/>
    <rect x="168" y="-10" width="3" height="20" rx="1.5" fill="#c084fc"/>
    <rect x="176" y="-18" width="3" height="36" rx="1.5" fill="#a855f7"/>
    <rect x="184" y="-8" width="3" height="16" rx="1.5" fill="#ec4899"/>
    <rect x="192" y="-12" width="3" height="24" rx="1.5" fill="#c084fc"/>
  </g>
  
  <!-- Brand text -->
  <g transform="translate(600, 560)">
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#c084fc" letter-spacing="6" opacity="0.7">STREAMWAVE</text>
  </g>
  
  <!-- Top left accent -->
  <g transform="translate(60, 50)">
    <rect width="4" height="32" rx="2" fill="#a855f7" opacity="0.6"/>
    <rect x="10" width="4" height="20" rx="2" fill="#ec4899" opacity="0.4"/>
  </g>
  
  <!-- Version tag -->
  <g transform="translate(1050, 575)">
    <rect x="0" y="-14" width="90" height="22" rx="11" fill="#a855f7" opacity="0.15"/>
    <text x="45" y="2" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#c084fc" opacity="0.6">v1.8.2</text>
  </g>
</svg>